<svg xmlns="http://www.w3.org/2000/svg" width="720" height="120" viewBox="0 0 720 120" role="img" aria-label="RetainPDF 翻译">
  <defs>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6fd6d2"/>
      <stop offset="42%" stop-color="#9b6dff"/>
      <stop offset="100%" stop-color="#e58aff"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="720" height="120" fill="none"/>
  <text x="360" y="76" text-anchor="middle"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="64" font-weight="800" fill="url(#titleGradient)" filter="url(#softGlow)">RetainPDF 翻译</text>
</svg>
